server {
    listen 80;
    server_name _;

    root /opt/taiko-ratingpro/webui/dist;
    index index.html;

    # API 白名单（按接口精确开放）
    # 通过 include 的配置文件定义允许访问的 API 路由
    include /etc/nginx/snippets/taiko-rating-api-allowlist.conf;

    # 默认拒绝其余 API
    location /api/ {
        return 403;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
